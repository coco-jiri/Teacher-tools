<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Timer</title>
    <style>
        :root {
            --bg-color: #222222;
            --text-color: #ffffff;
            --panel-bg: rgba(255, 255, 255, 0.15);
            --panel-blur: 10px;
            --warning-color: rgba(255, 0, 0, 0.25);
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: background-color 0.5s ease, color 0.5s ease;
            user-select: none;
        }

        /* --- Animace pulzování pro posledních 10s --- */
        @keyframes pulse {
            0% { background-color: var(--bg-color); }
            10% { background-color: var(--warning-color); }
            30% { background-color: var(--bg-color); }
        }

        .low-time-warning {
            animation: pulse 1s infinite ease-in-out;
        }

        #timer-display {
            font-size: min(35vw, 50vh);
            font-weight: bold;
            font-variant-numeric: tabular-nums;
            line-height: 1;
            z-index: 1;
            cursor: pointer;
        }

        .panel {
            background: var(--panel-bg);
            backdrop-filter: blur(var(--panel-blur));
            -webkit-backdrop-filter: blur(var(--panel-blur));
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            transition: opacity 0.5s ease, transform 0.5s ease;
            z-index: 10;
            max-width: 90%;
        }

        .hidden {
            opacity: 0 !important;
            pointer-events: none !important;
            transform: scale(0.95);
        }

        #settings-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        .inputs-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        input[type="number"] {
            width: 70px;
            padding: 10px;
            font-size: 1.2rem;
            border: none;
            border-radius: 8px;
            text-align: center;
            background: rgba(255, 255, 255, 0.8);
            color: #222;
        }

        .presets {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }

        button.preset-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: var(--text-color);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
        }

        button.preset-btn:hover { background: rgba(255, 255, 255, 0.4); }

        .config-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 5px;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        input[type="color"] {
            border: none;
            width: 35px;
            height: 35px;
            cursor: pointer;
            background: none;
        }

        #controls-overlay {
            display: flex;
            gap: 20px;
            z-index: 20;
            transition: opacity 0.3s ease;
        }

        .ctrl-btn {
            font-size: 1.5rem;
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.1s;
        }

        .ctrl-btn:active { transform: scale(0.95); }
        #btn-start { background-color: var(--text-color); color: var(--bg-color); }
        #btn-back { background-color: rgba(128, 128, 128, 0.5); color: white; padding: 15px 20px; }

        #popup-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.5rem;
            color: var(--text-color);
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        #popup-btn:hover { opacity: 1; }

        @media (max-height: 200px) {
            #controls-overlay {position: absolute; bottom: 3px;}
            #timer-display { font-size: min(35vw, 90vh); }
            body { justify-content: initial; }
            #btn-back { padding: 5px 10px; }
            .ctrl-btn { padding: 5px 10px; border-radius: 20px;}
        }
    </style>
</head>
<body>

    <div id="settings-panel" class="panel">
        <div class="inputs-row">
            <label>Nastavení času</label>
            <input type="number" id="input-min" placeholder="min" min="0" value="0" onkeydown="if(event.key==='Enter') toggleTimer()">
            <span>:</span>
            <input type="number" id="input-sec" placeholder="sec" min="0" max="59" value="0" onkeydown="if(event.key==='Enter') toggleTimer()">
        </div>

        <div class="presets">
            <button class="preset-btn" onclick="setPreset(0,30)">30s</button>
            <button class="preset-btn" onclick="setPreset(1,0)">1m</button>
            <button class="preset-btn" onclick="setPreset(2,0)">2m</button>
            <button class="preset-btn" onclick="setPreset(3,0)">3m</button>
            <button class="preset-btn" onclick="setPreset(5,0)">5m</button>
            <button class="preset-btn" onclick="setPreset(10,0)">10m</button>
            <button class="preset-btn" onclick="setPreset(15,0)">15m</button>
        </div>

        <div class="config-row">
            <label class="checkbox-container">
                <input type="checkbox" id="check-autorun" checked> Autostart
            </label>
            <div style="display:flex; align-items:center; gap:5px;">
                <label>Motiv:</label>
                <input type="color" id="color-picker" value="#222222">
            </div>
            <button id="popup-btn" title="Otevřít v novém okně">🗗</button>
        </div>
    </div>

    <div id="timer-display" onclick="toggleTimer()">00:00</div>

    <div id="controls-overlay">
        <button id="btn-back" class="ctrl-btn hidden" onclick="resetTimer()" title="Zpět na nastavení">⬅</button>
        <button id="btn-start" class="ctrl-btn" onclick="toggleTimer()">START</button>
    </div>

    <script>
        let totalSeconds = 0;
        let remainingSeconds = 0;
        let interval = null;
        let isRunning = false;
        let hideControlsTimeout = null;
        
        const display = document.getElementById('timer-display');
        const inputMin = document.getElementById('input-min');
        const inputSec = document.getElementById('input-sec');
        const settingsPanel = document.getElementById('settings-panel');
        const btnStart = document.getElementById('btn-start');
        const btnBack = document.getElementById('btn-back');
        const controlsOverlay = document.getElementById('controls-overlay');
        const colorPicker = document.getElementById('color-picker');
        const checkAutorun = document.getElementById('check-autorun');
        const root = document.documentElement;

        function saveSettings() {
            const settings = {
                min: inputMin.value,
                sec: inputSec.value,
                color: colorPicker.value,
                autorun: checkAutorun.checked
            };
            localStorage.setItem('timer_settings', JSON.stringify(settings));
        }

        [inputMin, inputSec, colorPicker, checkAutorun].forEach(el => {
            el.addEventListener('change', saveSettings);
        });

        function getContrastColor(hex) {
            const r = parseInt(hex.substr(1, 2), 16);
            const g = parseInt(hex.substr(3, 2), 16);
            const b = parseInt(hex.substr(5, 2), 16);
            const yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;
            return (yiq >= 128) ? 'black' : 'white';
        }

        function applyColor(hex) {
            if(!hex.startsWith('#')) hex = '#' + hex;
            const contrast = getContrastColor(hex);
            root.style.setProperty('--bg-color', hex);
            root.style.setProperty('--text-color', contrast);
            colorPicker.value = hex;
            const panelBg = contrast === 'white' ? 'rgba(0, 0, 0, 0.2)' : 'rgba(255, 255, 255, 0.3)';
            root.style.setProperty('--panel-bg', panelBg);
        }

        colorPicker.addEventListener('input', (e) => {
            applyColor(e.target.value);
            saveSettings();
        });

        function formatTime(sec) {
            const m = Math.floor(sec / 60);
            const s = sec % 60;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function updateDisplay() {
            display.textContent = formatTime(remainingSeconds);
            // Správa varovného pulzování
            if (isRunning && remainingSeconds <= 10 && remainingSeconds > 0) {
                document.body.classList.add('low-time-warning');
            } else {
                document.body.classList.remove('low-time-warning');
            }
        }

        function setPreset(min, sec) {
            inputMin.value = min;
            inputSec.value = sec;
            remainingSeconds = min * 60 + sec;
            updateDisplay();
            saveSettings();
        }

        function toggleTimer() {
            if (isRunning) pauseTimer();
            else startTimer();
        }

        function startTimer() {
            const isJustSwitchingFromSettings = (settingsPanel.style.display !== "none");

            if (remainingSeconds === 0 || (!interval && !isRunning)) {
                const m = parseInt(inputMin.value) || 0;
                const s = parseInt(inputSec.value) || 0;
                const time = m * 60 + s;
                if (time <= 0) return;
                
                if (totalSeconds === 0 || remainingSeconds === 0) {
                     totalSeconds = time;
                     remainingSeconds = time;
                }
            }

            settingsPanel.style.display = "none";
            display.style.display = "block";
            btnBack.classList.remove('hidden');
            updateDisplay();

            if (!checkAutorun.checked && isJustSwitchingFromSettings) {
                btnStart.textContent = "START";
                resetHideControlsTimer();
                return; 
            }

            blik("33ff88");
            isRunning = true;
            btnStart.textContent = "STOP";
            
            if (interval) clearInterval(interval);
            interval = setInterval(() => {
                remainingSeconds--;
                updateDisplay();
                if (remainingSeconds <= 0) finishTimer();
            }, 1000);
            resetHideControlsTimer();
        }

        function pauseTimer() {
            isRunning = false;
            clearInterval(interval);
            interval = null;
            btnStart.textContent = "START";
            blik();
            document.body.classList.remove('low-time-warning');
            controlsOverlay.style.display = "flex";
            clearTimeout(hideControlsTimeout);
        }

        function resetTimer() {
            pauseTimer();
            totalSeconds = 0;
            remainingSeconds = 0;
            settingsPanel.style.display = "flex";
            display.style.display = "none";
            btnBack.classList.add('hidden');
            btnStart.textContent = "START";
            const m = parseInt(inputMin.value) || 0;
            const s = parseInt(inputSec.value) || 0;
            display.textContent = formatTime(m * 60 + s);
        }

        function finishTimer() {
            pauseTimer();
            remainingSeconds = 0;
            updateDisplay();
            playBeep();
            btnStart.textContent = "RESTART";
        }

        function showControls() { controlsOverlay.style.display = "flex"; }
        function hideControls() { if (isRunning) controlsOverlay.style.display = "none"; }
        function resetHideControlsTimer() {
            showControls();
            clearTimeout(hideControlsTimeout);
            if (isRunning) hideControlsTimeout = setTimeout(hideControls, 1500);
        }
        document.addEventListener('mousemove', resetHideControlsTimer);
        document.addEventListener('click', resetHideControlsTimer);

        document.getElementById('popup-btn').addEventListener('click', () => {
            const width = 500, height = 400;
            const left = (screen.width - width) / 2, top = (screen.height - height) / 2;
            const m = inputMin.value, s = inputSec.value;
            const c = colorPicker.value.replace('#', '');
            const run = checkAutorun.checked ? '1' : '0';
            const currentPath = window.location.href.split('?')[0];
            const url = `${currentPath}?m=${m}&s=${s}&c=${c}&run=${run}`;
            window.open(url, 'TimerPopup', `width=${width},height=${height},top=${top},left=${left},menubar=no,toolbar=no,location=no,status=no`);
        });

        function loadSettings() {
            const params = new URLSearchParams(window.location.search);
            const m = params.get('m'), s = params.get('s'), c = params.get('c'), run = params.get('run');
            const saved = localStorage.getItem('timer_settings');
            let settings = saved ? JSON.parse(saved) : null;

            if (m !== null) inputMin.value = m;
            else if (settings) inputMin.value = settings.min;

            if (s !== null) inputSec.value = s;
            else if (settings) inputSec.value = settings.sec;

            if (c !== null) applyColor(c);
            else if (settings) applyColor(settings.color);

            if (run !== null) checkAutorun.checked = (run === '1');
            else if (settings) checkAutorun.checked = settings.autorun;

            resetTimer();
            if (run !== null) startTimer();
        }

        function blik(barva = 'ff6688') {
            const cssBarva = `#${barva}`;
            display.style.transition = 'background-color 0.1s ease-out';
            display.style.backgroundColor = cssBarva;
            setTimeout(() => {
                display.style.transition = 'background-color 0.5s ease-out';
                display.style.backgroundColor = 'transparent'; 
            }, 150);
        }

        let audioCtx = null;
        function playBeep(){
            try {
                if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const o = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                o.type = 'sine'; o.frequency.value = 1200;
                g.gain.setValueAtTime(0.01, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.18, audioCtx.currentTime + 0.001);
                g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 3.18);
                o.connect(g); g.connect(audioCtx.destination);
                o.start(); o.stop(audioCtx.currentTime + 3.18);
            } catch(e){ console.warn('Audio failed', e); }
        }

        loadSettings();
    </script>
</body>
</html>
